name: 🚀 Demo 投稿（VibeCoding Showcase）
description: 投稿一个很酷的 VibeCoding 案例（我们会收录到仓库展示区）
title: "[Demo] "
labels: ["demo", "submission", "triage"]
body:
  - type: input
    id: demo_name
    attributes:
      label: Demo 名称（必填）
      placeholder: 例如：AIops-CLI Copilot / 一句话生成海报工具
    validations:
      required: true

  - type: textarea
    id: one_liner
    attributes:
      label: 一句话介绍（必填）
      description: 让人一眼知道它牛在哪
      placeholder: 例如：输入一个需求，30 秒生成可用的 XXX，并自动部署到 XXX
    validations:
      required: true

  - type: input
    id: repo_url
    attributes:
      label: 代码仓库链接（必填）
      placeholder: https://github.com/xxx/xxx
    validations:
      required: true

  - type: input
    id: live_url
    attributes:
      label: 在线体验 / 演示链接（可选）
      placeholder: https://...
    validations:
      required: false

  - type: dropdown
    id: demo_type
    attributes:
      label: Demo 类型
      options:
        - Web 应用
        - CLI / 工具
        - Bot / Agent
        - 插件 / Extension
        - 组件 / UI
        - 工作流 / 自动化
        - 其他
    validations:
      required: true

  - type: dropdown
    id: tech_stack
    attributes:
      label: 技术栈（选一个主项）
      options:
        - JavaScript / TypeScript
        - Python
        - Go
        - Java
        - Rust
        - 多语言混合
        - 其他
    validations:
      required: true

  - type: textarea
    id: highlights
    attributes:
      label: 亮点（必填）
      description: 你觉得最值得展示的 3 点是什么？
      placeholder: |
        1) ...
        2) ...
        3) ...
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图 / 录屏（强烈建议）
      description: 直接拖拽上传图片或粘贴链接（最能打动人）
      placeholder: 粘贴图片/视频链接或直接上传
    validations:
      required: false

  - type: textarea
    id: how_to_run
    attributes:
      label: 本地运行方式（可选但加分）
      description: 让别人 3 分钟跑起来的那种
      placeholder: |
        1) ...
        2) ...
        3) ...
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 投稿确认
      options:
        - label: 我确认这份投稿不包含密钥/Token 等敏感信息
          required: true
        - label: 我允许社区在展示页中引用我的截图/简介（署名保留）
          required: true
        - label: 我已经确认链接可访问（或说明了访问要求）
          required: true
