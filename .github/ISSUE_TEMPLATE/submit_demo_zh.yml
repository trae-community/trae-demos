name: 🚀 Demo 投稿（中文）
description: 投稿一个很酷的 TRAE 案例（我们会收录到仓库展示区）
title: "[Demo] "
labels: ["demo", "submission", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## 感谢投稿！
        
        请填写以下信息，帮助我们更好地了解你的项目。
        
        > 💡 提示：标注为"必填"的字段请务必填写完整
        
        ---

  - type: input
    id: demo_name
    attributes:
      label: Demo 名称
      placeholder: 例如：AI 驱动的代码审查工具 / 一句话生成海报工具
    validations:
      required: true

  - type: textarea
    id: one_liner
    attributes:
      label: 一句话介绍
      description: 让人一眼知道它牛在哪
      placeholder: 例如：输入一个需求，30 秒生成可用的 CLI 工具，并自动部署到 npm
    validations:
      required: true

  - type: input
    id: repo_url
    attributes:
      label: 代码仓库链接
      placeholder: https://github.com/xxx/xxx
    validations:
      required: true

  - type: input
    id: live_url
    attributes:
      label: 在线体验 / 演示链接（可选）
      placeholder: https://demo.example.com
    validations:
      required: false

  - type: dropdown
    id: demo_type
    attributes:
      label: Demo 类型
      options:
        - Web 应用
        - CLI / 工具
        - Bot / Agent
        - 插件 / Extension
        - 组件 / UI
        - 工作流 / 自动化
        - 游戏
        - AI 应用
        - 其他
    validations:
      required: true

  - type: dropdown
    id: tech_stack
    attributes:
      label: 技术栈（选一个主项）
      options:
        - JavaScript / TypeScript
        - Python
        - Go
        - Java
        - Rust
        - C / C++
        - 多语言混合
        - 其他
    validations:
      required: true

  - type: textarea
    id: highlights
    attributes:
      label: 核心亮点
      description: 你觉得最值得展示的 3 点是什么？
      placeholder: |
        1. 使用了 TRAE 的 XXX 特性，实现了 XXX 功能
        2. 性能优化：XXX
        3. 创新点：XXX
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图 / 录屏（强烈建议）
      description: 直接拖拽上传图片或粘贴链接（最能打动人）
      placeholder: 粘贴图片/视频链接或直接拖拽上传
    validations:
      required: false

  - type: textarea
    id: how_to_run
    attributes:
      label: 本地运行方式（可选但加分）
      description: 让别人 3 分钟跑起来的那种
      placeholder: |
        1. git clone xxx
        2. npm install
        3. npm run dev
    validations:
      required: false

  - type: textarea
    id: additional_info
    attributes:
      label: 其他补充信息（可选）
      description: 开发故事、技术难点、未来计划等
      placeholder: 任何你想分享的内容...
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 投稿确认
      options:
        - label: 我确认这份投稿不包含密钥/Token 等敏感信息
          required: true
        - label: 我允许社区在展示页中引用我的截图/简介（署名保留）
          required: true
        - label: 我已经确认链接可访问（或说明了访问要求）
          required: true
