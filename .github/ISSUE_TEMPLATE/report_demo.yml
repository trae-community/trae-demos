name: 🚨 Demo 举报 / 下架请求（中文）
description: 链接失效、侵权、违规、不适合展示等
title: "[Report] "
labels: ["demo", "report", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## 感谢你的反馈
        
        我们重视社区内容质量和安全。如果你发现任何问题，请填写以下信息。
        
        > ⚠️ 我们会在 1-3 个工作日内处理你的举报
        
        ---

  - type: input
    id: target
    attributes:
      label: 关联的 Demo
      description: 请提供 Demo 的 Issue 编号或名称
      placeholder: 例如：#123 或 "AI 代码审查工具"
    validations:
      required: true

  - type: dropdown
    id: reason
    attributes:
      label: 举报原因
      options:
        - 链接失效 / 无法访问
        - 信息不准确 / 误导
        - 侵权 / 未授权内容
        - 含敏感信息 / 安全风险
        - 不符合社区展示范围
        - 内容违规 / 不当内容
        - 其他
    validations:
      required: true

  - type: textarea
    id: detail
    attributes:
      label: 详细说明
      description: 请详细描述问题，提供必要的证据或链接
      placeholder: |
        请说明：
        - 具体是什么问题？
        - 你是如何发现的？
        - 有相关证据吗？（截图、链接等）
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: 证据材料（可选）
      description: 上传截图、链接或其他证据
      placeholder: 拖拽上传图片或粘贴链接
    validations:
      required: false

  - type: input
    id: contact
    attributes:
      label: 联系方式（可选）
      description: 如果需要进一步沟通，请留下联系方式
      placeholder: 邮箱或其他联系方式
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 举报确认
      options:
        - label: 我确认以上信息真实有效
          required: true
        - label: 我理解恶意举报可能导致账号受限
          required: true
