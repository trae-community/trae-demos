name: 🚨 Demo Report / Takedown Request (English)
description: Broken links, copyright issues, violations, inappropriate content, etc.
title: "[Report] "
labels: ["demo", "report", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for your feedback
        
        We value community content quality and safety. If you've found any issues, please fill in the following information.
        
        > ⚠️ We'll process your report within 1-3 business days
        
        ---

  - type: input
    id: target
    attributes:
      label: Related Demo
      description: Please provide the Demo's Issue number or name
      placeholder: e.g., #123 or "AI Code Review Tool"
    validations:
      required: true

  - type: dropdown
    id: reason
    attributes:
      label: Report Reason
      options:
        - Broken link / Inaccessible
        - Inaccurate / Misleading information
        - Copyright infringement / Unauthorized content
        - Contains sensitive information / Security risk
        - Not suitable for community showcase
        - Inappropriate / Violating content
        - Other
    validations:
      required: true

  - type: textarea
    id: detail
    attributes:
      label: Detailed Description
      description: Please describe the issue in detail and provide necessary evidence or links
      placeholder: |
        Please explain:
        - What is the specific problem?
        - How did you discover it?
        - Do you have any evidence? (screenshots, links, etc.)
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence (Optional)
      description: Upload screenshots, links, or other evidence
      placeholder: Drag and drop images or paste links
    validations:
      required: false

  - type: input
    id: contact
    attributes:
      label: Contact Information (Optional)
      description: If further communication is needed, please provide contact information
      placeholder: Email or other contact method
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Report Confirmation
      options:
        - label: I confirm that the above information is true and valid
          required: true
        - label: I understand that malicious reports may result in account restrictions
          required: true
